# =============================================================================
# Nginx 配置 - s2a.ii.sb → sub2api (localhost:8080)
# 使用 Cloudflare Origin Certificate（15年证书）
# =============================================================================
# 使用方法：
#   1. 在 CF 控制台生成 Origin Certificate，下载后放到服务器：
#      mkdir -p /data/letsencrypt/s2a.ii.sb
#      - 证书 → /data/letsencrypt/s2a.ii.sb/fullchain.pem
#      - 私钥 → /data/letsencrypt/s2a.ii.sb/key.pem
#
#   2. 可选：CF 根证书（Authenticated Origin Pulls 用）：
#      curl -o /data/letsencrypt/origin-pull-ca.pem \
#        https://developers.cloudflare.com/ssl/static/authenticated_origin_pull_ca.pem
#
#   3. 部署配置：
#      cp nginx-s2a.conf /etc/nginx/sites-available/s2a.ii.sb
#      ln -s /etc/nginx/sites-available/s2a.ii.sb /etc/nginx/sites-enabled/
#      nginx -t && systemctl reload nginx
#
#   4. CF 控制台设置：
#      SSL/TLS → Overview → Full (Strict)
#      SSL/TLS → Origin Server → Authenticated Origin Pulls → ON（可选，更安全）
# =============================================================================

# HTTP → HTTPS 强制跳转
# 注：CF 开了"Always Use HTTPS"的话这段可以省略，但留着无害
server {
    listen 80;
    listen [::]:80;
    server_name s2a.ii.sb;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name s2a.ii.sb;

    # ------------------------------------------------------------------
    # Cloudflare Origin Certificate
    # 在 CF 控制台：SSL/TLS → Origin Server → Create Certificate 下载
    # 存放到服务器：/data/letsencrypt/s2a.ii.sb/
    # ------------------------------------------------------------------
    ssl_certificate     /data/letsencrypt/s2a.ii.sb/fullchain.pem;
    ssl_certificate_key /data/letsencrypt/s2a.ii.sb/key.pem;

    # 可选：开启 Authenticated Origin Pulls（只允许 CF 访问源站，防绕过）
    # 需要在 CF 控制台 SSL/TLS → Origin Server → Authenticated Origin Pulls 开启
    # ssl_client_certificate /data/letsencrypt/origin-pull-ca.pem;
    # ssl_verify_client on;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 基本安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # 日志
    access_log /var/log/nginx/s2a.ii.sb.access.log;
    error_log  /var/log/nginx/s2a.ii.sb.error.log;

    # 请求体大小（和容器 GATEWAY_MAX_BODY_SIZE 保持一致）
    client_max_body_size 256m;

    # ------------------------------------------------------------------
    # 反向代理到 sub2api 容器
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;

        # WebSocket / SSE / h2c 支持
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 传递真实客户端 IP（CF 会在 CF-Connecting-IP 里放真实 IP）
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 流式响应（SSE）必须关闭缓冲
        proxy_buffering off;
        proxy_cache     off;

        # 超时（AI 推理慢时不断连）
        proxy_connect_timeout  60s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
    }
}

# =============================================================================
# 需要在 /etc/nginx/nginx.conf 的 http {} 块里确认有以下内容（通常已存在）：
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
# =============================================================================
