name: Build & Push Image

on:
  # 手动触发：可自定义 tag，可选是否只构建 amd64（加速测试用）
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. latest, v1.0.0). Defaults to branch name.'
        required: false
        type: string
      amd64_only:
        description: 'Only build linux/amd64 (faster, for testing)'
        required: false
        type: boolean
        default: false
  # push tag 自动触发（格式：v*）
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 上传 Release Assets 需要写权限
  packages: write   # 写入 GHCR

jobs:
  # ============================================================
  # Job 1：构建多平台镜像并推送到 GHCR
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      is_tag_push: ${{ steps.meta.outputs.is_tag_push }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ------------------------------------------------------------------
      # 计算镜像 tag 和版本号
      # ------------------------------------------------------------------
      - name: Compute image tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/sub2api"
          IS_TAG_PUSH="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_TAG_PUSH="true"
          else
            VERSION="${GITHUB_REF_NAME//\//-}"
          fi

          # tag push 时同时打版本号 tag 和 latest
          TAGS="${IMAGE}:${VERSION}"
          if [ "$IS_TAG_PUSH" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "image=${IMAGE}"           >> $GITHUB_OUTPUT
          echo "version=${VERSION}"       >> $GITHUB_OUTPUT
          echo "tags=${TAGS}"             >> $GITHUB_OUTPUT
          echo "is_tag_push=${IS_TAG_PUSH}" >> $GITHUB_OUTPUT
          echo "📦 Image: ${IMAGE}"
          echo "🏷️  Tags:  ${TAGS}"

      # ------------------------------------------------------------------
      # 决定构建平台
      # ------------------------------------------------------------------
      - name: Determine platforms
        id: platforms
        run: |
          AMD64_ONLY="${{ github.event.inputs.amd64_only }}"
          if [ "$AMD64_ONLY" = "true" ]; then
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
            echo "⚡ Fast mode: amd64 only"
          else
            # 全平台：x86_64 服务器 + ARM64 (Apple M1/M2/树莓派4/Oracle ARM 免费机)
            # 注：node:24-alpine 不提供 arm/v7 镜像，无法支持该平台
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
            echo "🌍 Full mode: amd64 + arm64"
          fi

      # ------------------------------------------------------------------
      # Docker 多平台构建准备
      # ------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 构建并推送
      # ------------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
            GOPROXY=https://proxy.golang.org,direct
            GOSUMDB=sum.golang.org
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=sub2api
            org.opencontainers.image.description=Sub2API - AI API Gateway Platform
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

  # ============================================================
  # Job 2：打包部署制品（deploy/ 目录 + 注入正确镜像地址）
  # ============================================================
  package-deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image }}
      VERSION: ${{ needs.build-and-push.outputs.version }}
      IS_TAG_PUSH: ${{ needs.build-and-push.outputs.is_tag_push }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ------------------------------------------------------------------
      # 将 deploy/ 所有 compose 文件里的原始镜像地址替换为自己的 GHCR 镜像
      # ------------------------------------------------------------------
      - name: Prepare deploy artifacts
        run: |
          ARTIFACT_DIR="artifact/sub2api-deploy-${VERSION}"
          mkdir -p "${ARTIFACT_DIR}"

          # 复制整个 deploy 目录
          cp -r deploy/. "${ARTIFACT_DIR}/"

          # 替换所有 docker-compose*.yml 中的镜像地址
          # 原始：weishaw/sub2api:latest 或 weishaw/sub2api:vX.X.X
          # 替换为：ghcr.io/annihilater/sub2api:VERSION
          find "${ARTIFACT_DIR}" -name "docker-compose*.yml" | while read f; do
            sed -i "s|image: weishaw/sub2api:[^ ]*|image: ${IMAGE}:${VERSION}|g" "$f"
            echo "✅ Patched: $f"
          done

          # 删除本地构建相关文件（服务器不需要）
          rm -f "${ARTIFACT_DIR}/build_image.sh"
          rm -f "${ARTIFACT_DIR}/Dockerfile"
          rm -f "${ARTIFACT_DIR}/docker-compose.fork.yml"

          # 生成一个说明文件
          cat > "${ARTIFACT_DIR}/IMAGE.txt" << EOF
          Sub2API 部署制品
          ================
          镜像地址: ${IMAGE}:${VERSION}
          构建版本: ${VERSION}
          构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          构建来源: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          快速启动:
            1. 复制 .env.example 为 .env 并填写必要配置
            2. docker compose up -d
            3. 访问 http://localhost:8080

          更新镜像:
            docker compose pull && docker compose up -d
          EOF

          echo "📦 Artifact contents:"
          ls -la "${ARTIFACT_DIR}/"

      # ------------------------------------------------------------------
      # 打包为 zip
      # ------------------------------------------------------------------
      - name: Create zip archive
        run: |
          cd artifact
          zip -r "sub2api-deploy-${VERSION}.zip" "sub2api-deploy-${VERSION}/"
          echo "📦 Archive size: $(du -sh sub2api-deploy-${VERSION}.zip | cut -f1)"

      # ------------------------------------------------------------------
      # 上传为 GitHub Actions Artifact（所有触发方式都有，保留 7 天）
      # ------------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-deploy-${{ env.VERSION }}
          path: artifact/sub2api-deploy-${{ env.VERSION }}.zip
          retention-days: 7

      # ------------------------------------------------------------------
      # 始终上传到 GitHub Release Assets：
      #   - tag push    → 正式 Release（带版本号 tag）
      #   - 手动触发    → Pre-release（tag 为指定的 version，如 latest）
      # ------------------------------------------------------------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          prerelease: ${{ env.IS_TAG_PUSH != 'true' }}
          files: artifact/sub2api-deploy-${{ env.VERSION }}.zip
          fail_on_unmatched_files: true

      # ------------------------------------------------------------------
      # 输出摘要
      # ------------------------------------------------------------------
      - name: Summary
        run: |
          echo "## ✅ 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🐳 镜像" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.build-and-push.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📦 部署制品" >> $GITHUB_STEP_SUMMARY
          echo "文件名：\`sub2api-deploy-${VERSION}.zip\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "制品包含：" >> $GITHUB_STEP_SUMMARY
          echo "- \`docker-compose.yml\` - 完整版（含 PostgreSQL + Redis）" >> $GITHUB_STEP_SUMMARY
          echo "- \`docker-compose.local.yml\` - 本地目录挂载版" >> $GITHUB_STEP_SUMMARY
          echo "- \`docker-compose.standalone.yml\` - 仅应用（外置 DB/Redis）" >> $GITHUB_STEP_SUMMARY
          echo "- \`config.example.yaml\` - 配置文件示例" >> $GITHUB_STEP_SUMMARY
          echo "- \`IMAGE.txt\` - 镜像信息和快速启动说明" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🚀 服务器部署" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# 下载制品并解压" >> $GITHUB_STEP_SUMMARY
          echo "unzip sub2api-deploy-${VERSION}.zip && cd sub2api-deploy-${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 配置环境变量" >> $GITHUB_STEP_SUMMARY
          echo "cp .env.example .env && vim .env" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 启动" >> $GITHUB_STEP_SUMMARY
          echo "docker compose up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
